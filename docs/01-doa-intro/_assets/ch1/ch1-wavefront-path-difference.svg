<svg xmlns="http://www.w3.org/2000/svg" width="860" height="400" viewBox="0 0 860 400" fill="none">
  <rect width="860" height="400" fill="#FFFFFF" rx="18"/>
  <style>
    .title { font: 700 22px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1F2937; }
    .label { font: 500 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1F2937; }
    .small { font: 500 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
    .box { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.4; rx: 16; }
    .accent { fill: #ECFDF5; stroke: #0F766E; stroke-width: 1.6; rx: 16; }
    .warn { fill: #FFF7ED; stroke: #F59E0B; stroke-width: 1.4; rx: 16; }
    .arrow { stroke: #64748B; stroke-width: 2; stroke-linecap: round; }
    .grid { stroke: #CBD5E1; stroke-width: 1.2; }
    .strong { stroke: #0F766E; stroke-width: 2.2; stroke-linecap: round; }
    .soft { stroke: #F59E0B; stroke-width: 2; stroke-linecap: round; }
  </style>
  <text x="36" y="42" class="title">Wavefront and path difference</text>
<line x1="150" y1="300" x2="610" y2="300" class="grid"/>
<line x1="642" y1="300" x2="804" y2="300" class="grid"/>
<text x="708" y="333" class="label">array axis</text>
<text x="644" y="283" class="small">d</text>
<line x1="650" y1="288" x2="790" y2="288" class="soft"/>

<circle cx="200" cy="300" r="8" fill="#0F766E"/>
<circle cx="320" cy="300" r="8" fill="#0F766E"/>
<circle cx="440" cy="300" r="8" fill="#0F766E"/>
<circle cx="560" cy="300" r="8" fill="#0F766E"/>

<line x1="78" y1="128" x2="358" y2="368" class="grid"/>
<line x1="128" y1="92" x2="408" y2="332" class="grid"/>
<line x1="178" y1="56" x2="458" y2="296" class="grid"/>
<line x1="228" y1="20" x2="508" y2="260" class="grid"/>
<text x="80" y="82" class="label">incoming wavefronts</text>

<path d="M594 300 A130 130 0 0 0 493 190" class="soft"/>
<text x="520" y="214" class="label">θ</text>

<line x1="320" y1="300" x2="388" y2="246" class="strong"/>
<line x1="440" y1="300" x2="508" y2="246" class="strong"/>
<text x="378" y="234" class="small">Δr = d sin θ</text>

<text x="36" y="372" class="small">Far field keeps the wavefront almost parallel; narrowband turns delay into a phase rotation.</text>
</svg>
